<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0b0a"/>
      <stop offset="100%" stop-color="#141210"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#c9a45c" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="1050" cy="300" r="140" fill="#c9a45c" opacity="0.03" filter="url(#glow)"/>

  <!-- D5 particles — Row 1: mean-reverting drift, bright -->
  <circle cx="520" cy="180" r="4" fill="#c9a45c" opacity="0.22"/>
  <circle cx="570" cy="160" r="5" fill="#c9a45c" opacity="0.32"/>
  <circle cx="620" cy="140" r="5.5" fill="#c9a45c" opacity="0.42"/>
  <circle cx="670" cy="155" r="4.5" fill="#c9a45c" opacity="0.5"/>
  <circle cx="720" cy="175" r="6" fill="#c9a45c" opacity="0.58"/>
  <circle cx="775" cy="150" r="5" fill="#c9a45c" opacity="0.66"/>
  <circle cx="830" cy="130" r="6.5" fill="#c9a45c" opacity="0.74"/>
  <circle cx="890" cy="155" r="5.5" fill="#c9a45c" opacity="0.82"/>
  <circle cx="950" cy="140" r="7" fill="#c9a45c" opacity="0.88"/>
  <circle cx="1010" cy="160" r="6" fill="#c9a45c" opacity="0.92"/>
  <circle cx="1070" cy="145" r="7.5" fill="#c9a45c" opacity="0.96"/>
  <circle cx="1140" cy="155" r="8" fill="#c9a45c"/>

  <!-- Row 2: medium, wobbles around center -->
  <circle cx="530" cy="290" r="3.5" fill="#c9a45c" opacity="0.12"/>
  <circle cx="590" cy="310" r="4.5" fill="#c9a45c" opacity="0.18"/>
  <circle cx="660" cy="280" r="5" fill="#c9a45c" opacity="0.24"/>
  <circle cx="730" cy="305" r="4" fill="#c9a45c" opacity="0.3"/>
  <circle cx="800" cy="280" r="5.5" fill="#c9a45c" opacity="0.36"/>
  <circle cx="870" cy="310" r="4.5" fill="#c9a45c" opacity="0.4"/>
  <circle cx="940" cy="290" r="6" fill="#c9a45c" opacity="0.45"/>
  <circle cx="1010" cy="300" r="5" fill="#c9a45c" opacity="0.48"/>
  <circle cx="1080" cy="285" r="6.5" fill="#c9a45c" opacity="0.52"/>

  <!-- Row 3: faint, drifts down then back -->
  <circle cx="550" cy="400" r="2.5" fill="#c9a45c" opacity="0.04"/>
  <circle cx="630" cy="420" r="3.5" fill="#c9a45c" opacity="0.07"/>
  <circle cx="720" cy="440" r="4" fill="#c9a45c" opacity="0.1"/>
  <circle cx="810" cy="425" r="3.5" fill="#c9a45c" opacity="0.13"/>
  <circle cx="900" cy="400" r="4.5" fill="#c9a45c" opacity="0.16"/>
  <circle cx="990" cy="415" r="4" fill="#c9a45c" opacity="0.19"/>
  <circle cx="1080" cy="405" r="5" fill="#c9a45c" opacity="0.22"/>

  <!-- Title -->
  <text x="80" y="220" font-family="'DM Sans', sans-serif" font-size="72" font-weight="300" fill="#e8e4df" letter-spacing="-1">Brownian Motion</text>

  <!-- Subtitle -->
  <text x="84" y="268" font-family="'Space Mono', monospace" font-size="16" fill="#c9a45c" letter-spacing="0.05em" opacity="0.8">ORNSTEIN-UHLENBECK SCRIPT CHOP</text>

  <!-- Description -->
  <text x="84" y="318" font-family="'DM Sans', sans-serif" font-size="18" fill="#7a756e" font-weight="300">Smooth, mean-reverting procedural noise for TouchDesigner</text>

  <!-- Badges -->
  <g transform="translate(84, 350)">
    <rect width="55" height="22" rx="4" fill="#c9a45c" opacity="0.12"/>
    <text x="10" y="15" font-family="'Space Mono', monospace" font-size="10" fill="#c9a45c" letter-spacing="0.02em">v1.2</text>
  </g>
  <g transform="translate(148, 350)">
    <rect width="100" height="22" rx="4" fill="#c9a45c" opacity="0.06"/>
    <text x="10" y="15" font-family="'Space Mono', monospace" font-size="10" fill="#6a6560" letter-spacing="0.02em">TD 2025+</text>
  </g>

  <!-- Features -->
  <g font-family="'Space Mono', monospace" font-size="11" fill="#4a4540" letter-spacing="0.04em">
    <text x="84" y="560">SPRING-SMOOTHED</text>
    <text x="280" y="560">PER-AXIS RANGE</text>
    <text x="460" y="560">DETERMINISTIC</text>
    <text x="630" y="560">HEADLESS-TESTED</text>
  </g>
  <g fill="#c9a45c" opacity="0.3">
    <circle cx="264" cy="557" r="2"/>
    <circle cx="444" cy="557" r="2"/>
    <circle cx="614" cy="557" r="2"/>
  </g>
</svg>
